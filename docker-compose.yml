version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: llm-chat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-llmchat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-llmchat_secret}
      POSTGRES_DB: ${POSTGRES_DB:-llmchat}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-llmchat} -d ${POSTGRES_DB:-llmchat}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - llm-chat-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: llm-chat-backend
    restart: unless-stopped
    environment:
      # Database configuration
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-llmchat}:${POSTGRES_PASSWORD:-llmchat_secret}@postgres:5432/${POSTGRES_DB:-llmchat}
      # Security
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      # Application settings
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      # Server settings
      HOST: 0.0.0.0
      PORT: 8001
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - llm-chat-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8001}
    container_name: llm-chat-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - llm-chat-network

volumes:
  postgres_data:

networks:
  llm-chat-network:
    driver: bridge
